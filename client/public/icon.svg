<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#gradient)" />
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="white" stroke-width="12" stroke-opacity="0.2" />
  
  <!-- Glowing central star symbol -->
  <g filter="url(#glow)" transform="translate(156, 156)">
    <path d="M100 0 L130 70 L200 100 L130 130 L100 200 L70 130 L0 100 L70 70 Z" fill="white" />
    <!-- Secondary small sparkle -->
    <path d="M160 40 L170 60 L190 70 L170 80 L160 100 L150 80 L130 70 L150 60 Z" fill="white" fill-opacity="0.8" />
  </g>
</svg>
